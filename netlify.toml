[build]
  publish = "."

# Netlify can host the frontend only. The recommendation system now requires
# the FastAPI backend; deploy that separately and set window.MBWR_API_BASE_URL
# in config.js, or use the recommended single-service Render deployment.

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/data/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"
