services:
  - type: web
    name: mood-based-watch-recommender
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://mood-based-watch-recommender.onrender.com,http://localhost:8000,http://localhost:8765,http://127.0.0.1:8765
